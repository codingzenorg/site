name: Deploy site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4

      - name: Check out shesha
        uses: actions/checkout@v4
        with:
          repository: codingzenorg/shesha
          ref: main
          path: .external/shesha
          token: ${{ secrets.SHESHA_REPO_TOKEN || github.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build shesha
        working-directory: .external/shesha
        run: |
          npm ci
          npm run build -- --public-url ./

      - name: Stage shesha app
        run: npm run stage:shesha

      - name: Build site
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
